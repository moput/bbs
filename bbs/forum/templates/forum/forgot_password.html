{% extends 'forum/base.html' %}

{% block title %}找回密码 - 校园论坛{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">找回密码</h3>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="post" id="forgotPasswordForm">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <label for="email" class="form-label">注册邮箱</label>
                            <div class="input-group">
                                <input type="email" class="form-control" id="email" name="email" required 
                                       placeholder="请输入注册时使用的邮箱">
                                <button type="button" class="btn btn-outline-primary" id="getCodeBtn" 
                                        onclick="getVerificationCode()">获取验证码</button>
                            </div>
                            <div class="form-text">验证码将发送到您的邮箱，请注意查收</div>
                        </div>
                        <div class="form-group mb-3">
                            <label for="verification_code" class="form-label">验证码</label>
                            <input type="text" class="form-control" id="verification_code" name="verification_code" required 
                                   placeholder="请输入6位验证码">
                            <div class="form-text">验证码10分钟内有效，请及时填写</div>
                        </div>
                        <div class="form-group mb-3">
                            <label for="new_password" class="form-label">新密码</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required 
                                   placeholder="请输入新密码（至少6位）">
                            <div class="form-text">密码长度至少6位，建议使用字母、数字和符号的组合</div>
                        </div>
                        <div class="form-group mb-3">
                            <label for="confirm_password" class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required 
                                   placeholder="请再次输入新密码">
                            <div class="form-text">请确保两次输入的密码一致</div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">重置密码</button>
                            <a href="{% url 'forum:login' %}" class="btn btn-link">返回登录</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let countdown = 60;
let timer = null;

function getVerificationCode() {
    const email = document.getElementById('email').value;
    if (!email) {
        alert('请输入邮箱地址');
        return;
    }
    
    // 发送获取验证码请求
    fetch('/send-reset-password-code/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({ email: email })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            // 禁用按钮并开始倒计时
            const btn = document.getElementById('getCodeBtn');
            btn.disabled = true;
            btn.textContent = `${countdown}秒后重新获取`;
            
            timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                    countdown = 60;
                } else {
                    btn.textContent = `${countdown}秒后重新获取`;
                }
            }, 1000);
            
            // 显示成功提示
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success alert-dismissible fade show mt-3';
            alertDiv.innerHTML = `
                验证码已发送到您的邮箱，请注意查收
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            document.querySelector('.card-body').insertBefore(alertDiv, document.querySelector('form'));
        } else {
            // 显示错误提示
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show mt-3';
            alertDiv.innerHTML = `
                ${data.message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            document.querySelector('.card-body').insertBefore(alertDiv, document.querySelector('form'));
        }
    })
    .catch(error => {
        console.error('Error:', error);
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-danger alert-dismissible fade show mt-3';
        alertDiv.innerHTML = `
            获取验证码失败，请稍后重试
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        `;
        document.querySelector('.card-body').insertBefore(alertDiv, document.querySelector('form'));
    });
}
</script>
{% endblock %}
